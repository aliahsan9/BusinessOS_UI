<div class="notification-bell">
  <button
    type="button"
    class="notification-bell__btn"
    aria-label="Notifications"
    [attr.aria-expanded]="notificationState.panelOpen()"
    (click)="toggle()"
  >
    <span class="notification-bell__icon" aria-hidden="true">🔔</span>
    @if (notificationState.hasUnread()) {
      <span class="notification-bell__count" [attr.aria-label]="notificationState.unreadCount() + ' unread'">
        {{ notificationState.unreadCount() > 99 ? '99+' : notificationState.unreadCount() }}
      </span>
    }
  </button>

  @if (notificationState.panelOpen()) {
    <app-notification-panel />
  }
</div>
