<div class="app-alert" [class]="'app-alert--' + variant()" role="alert">
  <div class="app-alert__content">
    @if (title()) {
      <strong class="app-alert__title">{{ title() }}</strong>
    }
    <p class="app-alert__message">{{ message() }}</p>
  </div>
  @if (dismissible()) {
    <button type="button" class="app-alert__close" aria-label="Dismiss alert" (click)="dismissed.emit()">×</button>
  }
</div>
