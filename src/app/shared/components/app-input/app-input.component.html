<div class="app-input" [class.app-input--error]="error()" [class.app-input--disabled]="isDisabled() || disabled()">
  @if (label()) {
    <label [for]="id()" class="app-input__label">
      {{ label() }}
      @if (required()) {
        <span class="app-input__required" aria-hidden="true">*</span>
      }
    </label>
  }
  <input
    class="app-input__control form-control"
    [id]="id()"
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="isDisabled() || disabled()"
    [required]="required()"
    [attr.autocomplete]="autocomplete()"
    [attr.aria-invalid]="!!error()"
    [attr.aria-describedby]="error() ? id() + '-error' : hint() ? id() + '-hint' : null"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
  @if (hint() && !error()) {
    <small [id]="id() + '-hint'" class="app-input__hint">{{ hint() }}</small>
  }
  @if (error()) {
    <small [id]="id() + '-error'" class="app-input__error" role="alert">{{ error() }}</small>
  }
</div>
