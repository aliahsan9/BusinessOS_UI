<div class="export-dialog-backdrop" role="dialog" aria-modal="true">
  <div class="export-dialog">
    <h3 class="export-dialog__title">{{ title() }}</h3>
    <p class="export-dialog__message">{{ message() }}</p>

    <div class="export-dialog__options">
      @for (option of reportOptions(); track option.type) {
        <button
          type="button"
          class="export-dialog__option"
          [disabled]="loading()"
          (click)="onExport(option.type)"
        >
          <span class="export-dialog__option-label">{{ option.label }}</span>
          <span class="export-dialog__option-format">PDF</span>
        </button>
      }
    </div>

    <div class="export-dialog__actions">
      <app-button
        label="Cancel"
        [variant]="ButtonVariant.Outline"
        [disabled]="loading()"
        (clicked)="onCancel()"
      />
    </div>
  </div>
</div>
