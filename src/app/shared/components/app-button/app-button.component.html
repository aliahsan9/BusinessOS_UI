<button
  [type]="type()"
  class="app-btn"
  [class]="'app-btn--' + variant() + ' app-btn--' + size()"
  [class.app-btn--loading]="loading()"
  [class.app-btn--block]="fullWidth()"
  [disabled]="disabled() || loading()"
  [attr.aria-label]="ariaLabel() || label()"
  [attr.aria-busy]="loading()"
  (click)="onClick($event)"
>
  @if (loading()) {
    <span class="app-btn__spinner" aria-hidden="true"></span>
  }
  @if (icon()) {
    <span class="app-btn__icon" aria-hidden="true">{{ icon() }}</span>
  }
  <span class="app-btn__label">{{ label() }}</span>
</button>
