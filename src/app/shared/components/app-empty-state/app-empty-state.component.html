<div class="app-empty-state" role="status">
  <span class="app-empty-state__icon" aria-hidden="true">{{ icon() }}</span>
  <h3 class="app-empty-state__title">{{ title() }}</h3>
  @if (description()) {
    <p class="app-empty-state__description">{{ description() }}</p>
  }
  @if (actionLabel()) {
    <app-button [label]="actionLabel()!" [variant]="actionVariant()" (clicked)="action.emit()" />
  }
</div>
