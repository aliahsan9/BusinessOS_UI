<nav class="app-pagination" aria-label="Pagination">
  <span class="app-pagination__info">
    Showing {{ startItem() }}–{{ endItem() }} of {{ totalCount() }}
  </span>
  <ul class="app-pagination__list">
    <li>
      <button type="button" class="app-pagination__btn" [disabled]="page() <= 1" (click)="goTo(page() - 1)" aria-label="Previous page">‹</button>
    </li>
    @for (p of pages(); track p) {
      <li>
        <button
          type="button"
          class="app-pagination__btn"
          [class.app-pagination__btn--active]="p === page()"
          [attr.aria-current]="p === page() ? 'page' : null"
          (click)="goTo(p)"
        >
          {{ p }}
        </button>
      </li>
    }
    <li>
      <button type="button" class="app-pagination__btn" [disabled]="page() >= totalPages()" (click)="goTo(page() + 1)" aria-label="Next page">›</button>
    </li>
  </ul>
</nav>
