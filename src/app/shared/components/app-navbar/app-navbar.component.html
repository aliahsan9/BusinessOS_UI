<header class="app-navbar">
  <div class="app-navbar__start">
    <button type="button" class="app-navbar__menu-btn" aria-label="Toggle navigation menu" (click)="menuToggle.emit()">
      <span class="app-navbar__menu-icon" aria-hidden="true"></span>
    </button>
    <span class="app-navbar__brand">BusinessOS</span>
  </div>

  <nav class="app-navbar__nav" aria-label="Quick navigation">
    @for (item of navItems; track item.route) {
      <a
        class="app-navbar__nav-link"
        [routerLink]="item.route"
        routerLinkActive="app-navbar__nav-link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        [title]="item.description"
      >
        <span class="app-navbar__nav-icon" aria-hidden="true">{{ item.icon }}</span>
        <span class="app-navbar__nav-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="app-navbar__actions">
    <button
      type="button"
      class="app-navbar__action-btn"
      [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      [attr.aria-pressed]="isDarkMode()"
      (click)="toggleDarkMode()"
    >
      {{ isDarkMode() ? '☀️' : '🌙' }}
    </button>

    <button
      type="button"
      class="app-navbar__action-btn"
      [class.app-navbar__action-btn--active]="aiAssistantOpen()"
      aria-label="Open BusinessOS AI Assistant"
      [attr.aria-expanded]="aiAssistantOpen()"
      title="BusinessOS AI Assistant"
      (click)="toggleAiAssistant()"
    >
      ✨
    </button>

    @if (canViewNotifications()) {
      <app-notification-bell />
    }

    <div class="app-navbar__dropdown">
      <button
        type="button"
        class="app-navbar__profile"
        aria-label="User menu"
        [attr.aria-expanded]="showProfile()"
        (click)="toggleProfile()"
      >
        @if (showCompanyLogo()) {
          <img
            class="app-navbar__avatar app-navbar__avatar-image"
            [src]="companyLogoUrl()!"
            alt="Company logo"
            (load)="onLogoLoad()"
            (error)="onLogoError()"
          />
        } @else {
          <span class="app-navbar__avatar" aria-hidden="true">{{ userInitial() }}</span>
        }
        <span class="app-navbar__profile-text">
          <span class="app-navbar__profile-name">{{ userDisplayName() }}</span>
          <span class="app-navbar__profile-role">Account</span>
        </span>
      </button>
      @if (showProfile()) {
        <div class="app-navbar__panel" role="menu">
          <div class="app-navbar__panel-header">{{ currentUser()?.email }}</div>
          <a class="app-navbar__menu-item" role="menuitem" [routerLink]="routes.profile" (click)="closeProfileMenu()">Profile</a>
          <a class="app-navbar__menu-item" role="menuitem" [routerLink]="settingsRoutes.settings.appearance" (click)="closeProfileMenu()">Appearance</a>
          <a class="app-navbar__menu-item" role="menuitem" [routerLink]="settingsRoutes.settings.hub" (click)="closeProfileMenu()">Settings</a>
          <button type="button" class="app-navbar__menu-item app-navbar__menu-item--danger" role="menuitem" (click)="logout()">Sign out</button>
        </div>
      }
    </div>
  </div>
</header>
