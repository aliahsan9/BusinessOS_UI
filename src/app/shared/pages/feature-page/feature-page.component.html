<section class="feature-page">
  <app-breadcrumb [items]="breadcrumbs" />

  <header class="feature-page__header">
    <span class="feature-page__icon" aria-hidden="true">{{ pageData.icon }}</span>
    <div>
      <h1 class="feature-page__title">{{ pageData.pageTitle }}</h1>
      <p class="feature-page__description">{{ pageData.description }}</p>
    </div>
  </header>

  <app-card>
    <app-empty-state
      [icon]="pageData.icon"
      [title]="pageData.pageTitle + ' module'"
      [description]="'This section is ready for implementation. API endpoints are available on the backend.'"
    />
  </app-card>
</section>
