<div class="dashboard-layout">
  <app-sidebar [mobileOpen]="mobileSidebarOpen()" (mobileClose)="closeMobileSidebar()" />

  <div class="dashboard-layout__main">
    <app-navbar (menuToggle)="toggleMobileSidebar()" />

    <main class="dashboard-layout__content" id="main-content">
      <router-outlet />
    </main>

    <footer class="dashboard-layout__footer">
      <span>© {{ currentYear }} BusinessOS. All rights reserved.</span>
    </footer>
  </div>

  <app-ai-assistant-widget />
</div>
