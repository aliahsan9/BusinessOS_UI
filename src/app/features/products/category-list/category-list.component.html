<app-breadcrumb
  [items]="[
    { label: 'Products', route: routes.products.list },
    { label: 'Categories' },
  ]"
/>

<app-page-header
  title="Categories"
  subtitle="Flat category list — organize products by type."
  [actions]="headerActions"
/>

@if (error()) {
  <app-alert variant="danger" [message]="error()!" />
}

<div class="toolbar">
  <app-search-bar placeholder="Search categories..." [value]="searchTerm()" (search)="onSearch($event)" />
  <a [routerLink]="routes.products.list"><app-button label="Back to Products" [variant]="ButtonVariant.Outline" /></a>
</div>

@if (loading()) {
  @for (i of [1, 2, 3, 4]; track i) { <app-skeleton height="2rem" /> }
} @else if (items().length === 0) {
  <app-empty-state icon="🏷️" title="No categories" description="Create categories to organize your products." />
} @else {
  <div class="bos-table-wrapper">
    <table class="bos-table bos-table--striped bos-table--hover">
      <thead>
        <tr>
          <th>Name</th>
          <th>Description</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (cat of items(); track cat.id) {
          <tr>
            <td>{{ cat.name }}</td>
            <td>{{ cat.description || '—' }}</td>
            <td class="bos-table__actions">
              @if (canUpdate) {
                <a [routerLink]="['/products/categories', cat.id, 'edit']">Edit</a>
              }
              @if (canDelete) {
                <button type="button" class="btn-link text-danger" (click)="confirmDelete(cat.id)">Delete</button>
              }
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <app-pagination
    [page]="page()"
    [pageSize]="pageSize()"
    [totalCount]="totalCount()"
    [totalPages]="totalPages()"
    (pageChange)="onPageChange($event)"
  />
}

@if (deleteId()) {
  <app-confirm-dialog
    title="Delete Category"
    message="Are you sure? Categories with products cannot be deleted."
    confirmLabel="Delete"
    [loading]="deleting()"
    (confirmed)="deleteCategory()"
    (cancelled)="deleteId.set(null)"
  />
}
