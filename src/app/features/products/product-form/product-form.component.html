<app-breadcrumb
  [items]="[
    { label: 'Products', route: routes.products.list },
    { label: isEdit() ? 'Edit Product' : 'Create Product' },
  ]"
/>

<app-page-header
  [title]="isEdit() ? 'Edit Product' : 'Create Product'"
  subtitle="Fields align with your product catalog API."
/>

@if (loading()) {
  <app-skeleton height="20rem" variant="rect" />
} @else {
  <form [formGroup]="form" (ngSubmit)="submit()" class="product-form">
    <div class="product-form__grid">
      <app-card title="Basic Information">
        <div class="form-grid">
          <div class="form-field">
            <label for="categoryId">Category *</label>
            <select id="categoryId" formControlName="categoryId" class="form-select">
              <option value="">Select category</option>
              @for (cat of categories(); track cat.id) {
                <option [value]="cat.id">{{ cat.name }}</option>
              }
            </select>
          </div>
          <app-input label="Product Name *" formControlName="name" [error]="fieldError('name') ?? undefined" />
          <app-input label="SKU *" formControlName="sku" [error]="fieldError('sku') ?? undefined" />
          <div class="form-field form-field--full">
            <label for="description">Description</label>
            <textarea id="description" formControlName="description" class="form-control" rows="3"></textarea>
          </div>
        </div>
      </app-card>

      <app-card title="Pricing & Stock">
        <div class="form-grid">
          <app-input label="Cost Price *" type="number" formControlName="costPrice" [error]="fieldError('costPrice') ?? undefined" />
          <app-input label="Selling Price *" type="number" formControlName="salePrice" [error]="fieldError('salePrice') ?? undefined" />
          <div class="form-field">
            <label>Profit Margin</label>
            <p class="computed-value">{{ margin() | number: '1.1-1' }}%</p>
          </div>
          <app-input label="Reorder Level *" type="number" formControlName="reorderLevel" [error]="fieldError('reorderLevel') ?? undefined" />
          @if (isEdit()) {
            <div class="form-field">
              <label class="checkbox-label">
                <input type="checkbox" formControlName="isActive" />
                Product is active
              </label>
            </div>
          }
        </div>
      </app-card>
    </div>

    <div class="product-form__actions">
      <a [routerLink]="routes.products.list"><app-button label="Cancel" [variant]="ButtonVariant.Outline" type="button" /></a>
      <app-button [label]="isEdit() ? 'Save Changes' : 'Create Product'" type="submit" [loading]="saving()" />
    </div>
  </form>
}
