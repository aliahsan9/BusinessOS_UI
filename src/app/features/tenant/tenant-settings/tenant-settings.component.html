<app-breadcrumb [items]="breadcrumbs" />

<app-page-header
  title="Tenant Settings"
  subtitle="Manage business branding, timezone, currency, and profile details."
/>

@if (loading()) {
  <app-skeleton height="16rem" />
} @else {
  @if (error()) {
    <app-alert variant="danger" [message]="error()!" />
  }

  <form [formGroup]="form" (ngSubmit)="save()" class="settings-form">
    <app-card title="Branding">
      <div class="form-grid">
        <app-input label="Business Name" formControlName="name" [required]="true" />
        <app-input label="Logo URL" formControlName="logoUrl" />
        <app-input label="Timezone" formControlName="timezone" [required]="true" />
        <app-input label="Currency" formControlName="currency" [required]="true" />
      </div>
    </app-card>

    <app-card title="Business Details">
      <div class="form-grid">
        <app-input label="Industry / Business Type" formControlName="businessType" [required]="true" />
        <app-input label="Email" type="email" formControlName="email" [required]="true" />
        <app-input label="Phone" formControlName="phone" [required]="true" />
        <app-input label="Address" formControlName="address" [required]="true" />
        <app-input label="Website" formControlName="website" />
        <app-input label="Description" formControlName="description" />
      </div>
    </app-card>

    @if (canManage) {
      <div class="actions">
        <app-button label="Save Settings" type="submit" [loading]="saving()" [disabled]="form.invalid || saving()" />
      </div>
    }
  </form>
}
