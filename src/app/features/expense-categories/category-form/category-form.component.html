<app-breadcrumb
  [items]="[
    { label: 'Expense Categories', route: routes.expenseCategories.list },
    { label: isEdit() ? 'Edit Category' : 'Create Category' },
  ]"
/>

<app-page-header
  [title]="isEdit() ? 'Edit Category' : 'Create Category'"
  subtitle="Define expense categories for tracking and reporting."
/>

@if (loading()) {
  <app-skeleton height="16rem" variant="rect" />
} @else {
  <form [formGroup]="form" (ngSubmit)="submit()" class="entity-form">
    <app-card title="Category Details">
      <div class="form-grid">
        <app-input label="Name *" formControlName="name" [error]="fieldError('name') ?? undefined" />
        <div class="form-field form-field--full">
          <label for="description">Description</label>
          <textarea id="description" formControlName="description" class="form-control" rows="3"></textarea>
        </div>
        @if (isEdit()) {
          <div class="form-field">
            <label class="checkbox-label">
              <input type="checkbox" formControlName="isActive" />
              Active category
            </label>
          </div>
        }
      </div>
    </app-card>

    <div class="entity-form__actions">
      <a [routerLink]="routes.expenseCategories.list"><app-button label="Cancel" [variant]="ButtonVariant.Outline" type="button" /></a>
      <app-button [label]="isEdit() ? 'Save Changes' : 'Create Category'" type="submit" [loading]="saving()" />
    </div>
  </form>
}
