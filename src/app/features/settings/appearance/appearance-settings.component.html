<app-breadcrumb [items]="breadcrumbs" />

<app-page-header
  title="Appearance"
  subtitle="Personalize themes, typography, layout, and accessibility across the entire application."
  [actions]="headerActions"
/>

<div class="appearance">
  <div class="appearance__grid">
    <div class="appearance__main">
      <app-card title="Theme Selection" subtitle="Choose a color palette. Changes apply instantly.">
        <app-theme-selector />
      </app-card>

      <app-card title="Typography">
        <div class="appearance__form-grid">
          <div class="form-field">
            <label for="font-family">Font Family</label>
            <select
              id="font-family"
              class="form-select"
              [ngModel]="preferences().fontFamily"
              (ngModelChange)="updatePref({ fontFamily: $event })"
            >
              @for (opt of fontOptions; track opt.id) {
                <option [value]="opt.id">{{ opt.label }}</option>
              }
            </select>
          </div>
          <div class="form-field">
            <label for="font-size">Font Size</label>
            <select
              id="font-size"
              class="form-select"
              [ngModel]="preferences().fontSize"
              (ngModelChange)="updatePref({ fontSize: $event })"
            >
              @for (opt of fontSizeOptions; track opt.id) {
                <option [value]="opt.id">{{ opt.label }}</option>
              }
            </select>
          </div>
          <div class="form-field">
            <label for="border-radius">Border Radius</label>
            <select
              id="border-radius"
              class="form-select"
              [ngModel]="preferences().borderRadius"
              (ngModelChange)="updatePref({ borderRadius: $event })"
            >
              @for (opt of borderRadiusOptions; track opt.id) {
                <option [value]="opt.id">{{ opt.label }}</option>
              }
            </select>
          </div>
        </div>
      </app-card>

      <app-card title="Layout">
        <div class="appearance__form-grid">
          <div class="form-field">
            <label for="sidebar-style">Sidebar Style</label>
            <select
              id="sidebar-style"
              class="form-select"
              [ngModel]="preferences().sidebarStyle"
              (ngModelChange)="updatePref({ sidebarStyle: $event })"
            >
              @for (opt of sidebarOptions; track opt.id) {
                <option [value]="opt.id">{{ opt.label }}</option>
              }
            </select>
          </div>
          <div class="form-field">
            <label for="navbar-style">Navbar Style</label>
            <select
              id="navbar-style"
              class="form-select"
              [ngModel]="preferences().navbarStyle"
              (ngModelChange)="updatePref({ navbarStyle: $event })"
            >
              @for (opt of navbarOptions; track opt.id) {
                <option [value]="opt.id">{{ opt.label }}</option>
              }
            </select>
          </div>
          <div class="form-field">
            <label for="footer-visibility">Footer</label>
            <select
              id="footer-visibility"
              class="form-select"
              [ngModel]="preferences().footerVisibility"
              (ngModelChange)="updatePref({ footerVisibility: $event })"
            >
              @for (opt of footerOptions; track opt.id) {
                <option [value]="opt.id">{{ opt.label }}</option>
              }
            </select>
          </div>
          <div class="form-field">
            <label for="card-style">Card Style</label>
            <select
              id="card-style"
              class="form-select"
              [ngModel]="preferences().cardStyle"
              (ngModelChange)="updatePref({ cardStyle: $event })"
            >
              @for (opt of cardStyleOptions; track opt.id) {
                <option [value]="opt.id">{{ opt.label }}</option>
              }
            </select>
          </div>
          <div class="form-field">
            <label for="table-density">Table Density</label>
            <select
              id="table-density"
              class="form-select"
              [ngModel]="preferences().tableDensity"
              (ngModelChange)="updatePref({ tableDensity: $event })"
            >
              @for (opt of tableDensityOptions; track opt.id) {
                <option [value]="opt.id">{{ opt.label }}</option>
              }
            </select>
          </div>
        </div>
      </app-card>

      <app-card title="Custom Theme Builder">
        <p class="appearance__hint">Create a custom color palette and save it to your theme library.</p>
        <app-button [label]="showBuilder() ? 'Hide Builder' : 'Open Builder'" [variant]="ButtonVariant.Outline" (clicked)="toggleBuilder()" />
        @if (showBuilder()) {
          <div class="appearance__builder">
            <div class="form-field">
              <label for="custom-name">Theme Name</label>
              <input id="custom-name" class="form-control" [(ngModel)]="customThemeName" placeholder="My Custom Theme" />
            </div>
            <div class="appearance__color-grid">
              <div class="form-field">
                <label for="custom-primary">Primary Color</label>
                <input id="custom-primary" type="color" class="appearance__color-input" [(ngModel)]="customPrimary" />
              </div>
              <div class="form-field">
                <label for="custom-bg">Background</label>
                <input id="custom-bg" type="color" class="appearance__color-input" [(ngModel)]="customBackground" />
              </div>
              <div class="form-field">
                <label for="custom-surface">Surface</label>
                <input id="custom-surface" type="color" class="appearance__color-input" [(ngModel)]="customSurface" />
              </div>
              <div class="form-field">
                <label for="custom-text">Text</label>
                <input id="custom-text" type="color" class="appearance__color-input" [(ngModel)]="customText" />
              </div>
            </div>
            <div
              class="appearance__builder-preview"
              [style.--preview-bg]="customBackground"
              [style.--preview-surface]="customSurface"
              [style.--preview-primary]="customPrimary"
              [style.--preview-text]="customText"
            >
              <div class="appearance__builder-preview-card">
                <span class="appearance__builder-preview-title">Preview</span>
                <button type="button" class="appearance__builder-preview-btn">Button</button>
              </div>
            </div>
            <app-button label="Save Custom Theme" (clicked)="saveCustomTheme()" />
          </div>
        }
      </app-card>
    </div>

    <aside class="appearance__sidebar">
      <app-card title="Quick Options">
        <div class="appearance__toggles">
          <label class="appearance__toggle">
            <input
              type="checkbox"
              [checked]="resolvedAppearance() === 'dark'"
              (change)="toggleDarkMode()"
            />
            <span>Dark Mode</span>
          </label>
          <label class="appearance__toggle">
            <input
              type="checkbox"
              [checked]="preferences().colorScheme === 'system'"
              (change)="toggleSystemScheme($any($event.target).checked)"
            />
            <span>Follow System</span>
          </label>
          <label class="appearance__toggle">
            <input
              type="checkbox"
              [checked]="preferences().compactMode"
              (change)="onCompactModeChange($any($event.target).checked)"
            />
            <span>Compact Mode</span>
          </label>
          <label class="appearance__toggle">
            <input
              type="checkbox"
              [checked]="preferences().animationsEnabled"
              (change)="onAnimationsChange($any($event.target).checked)"
            />
            <span>Animations</span>
          </label>
          <label class="appearance__toggle">
            <input
              type="checkbox"
              [checked]="preferences().largeFontMode"
              (change)="onLargeFontChange($any($event.target).checked)"
            />
            <span>Large Font Mode</span>
          </label>
          <label class="appearance__toggle">
            <input
              type="checkbox"
              [checked]="preferences().reducedMotion"
              (change)="onReducedMotionChange($any($event.target).checked)"
            />
            <span>Reduced Motion</span>
          </label>
        </div>

        <div class="form-field">
          <label for="color-scheme">Color Scheme</label>
          <select
            id="color-scheme"
            class="form-select"
            [ngModel]="preferences().colorScheme"
            (ngModelChange)="updatePref({ colorScheme: $event })"
          >
            @for (opt of colorSchemeOptions; track opt.id) {
              <option [value]="opt.id">{{ opt.label }}</option>
            }
          </select>
        </div>
      </app-card>

      <app-card title="Import / Export">
        <div class="appearance__actions">
          <app-button label="Export Theme" [variant]="ButtonVariant.Outline" (clicked)="exportTheme()" />
          <label class="appearance__import-label">
            <app-button label="Import Theme" [variant]="ButtonVariant.Outline" />
            <input type="file" accept="application/json,.json" class="appearance__import-input" (change)="onImportFile($event)" />
          </label>
          <app-button label="Reset to Defaults" [variant]="ButtonVariant.Ghost" (clicked)="resetTheme()" />
        </div>
      </app-card>

      <div class="appearance__save-bar">
        <app-button label="Save & Sync" [loading]="saving()" (clicked)="saveAndSync()" />
      </div>
    </aside>
  </div>
</div>
