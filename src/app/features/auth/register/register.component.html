<div class="auth-form">
  <div class="auth-form__header">
    <h2 class="auth-form__title">Create your account</h2>
    <p class="auth-form__subtitle">Start managing your business in minutes</p>
  </div>

  @if (errorMessage()) {
    <app-alert [message]="errorMessage()!" variant="danger" />
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="row g-3">
      <div class="col-md-6">
        <app-input label="First name" formControlName="firstName" [required]="true" [error]="getFieldError(form.controls.firstName, 'First name') ?? undefined" />
      </div>
      <div class="col-md-6">
        <app-input label="Last name" formControlName="lastName" [required]="true" [error]="getFieldError(form.controls.lastName, 'Last name') ?? undefined" />
      </div>
    </div>

    <app-input label="Business name" formControlName="businessName" [required]="true" [error]="getFieldError(form.controls.businessName, 'Business name') ?? undefined" />

    <app-input label="Email" type="email" formControlName="email" autocomplete="email" [required]="true" [error]="getFieldError(form.controls.email, 'Email') ?? undefined" />

    <app-input label="Password" type="password" formControlName="password" autocomplete="new-password" [required]="true" hint="Min 8 characters with upper, lower, and number" [error]="getFieldError(form.controls.password, 'Password') ?? undefined" />

    <app-input label="Confirm password" type="password" formControlName="confirmPassword" autocomplete="new-password" [required]="true" [error]="getFieldError(form.controls.confirmPassword, 'Confirm password') ?? undefined" />

    <app-button label="Create account" type="submit" [loading]="loading()" [fullWidth]="true" />

    <p class="auth-form__footer">
      Already have an account?
      <a routerLink="/auth/login" class="auth-form__link">Sign in</a>
    </p>
  </form>
</div>
