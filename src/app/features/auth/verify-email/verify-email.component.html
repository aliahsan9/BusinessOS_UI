<section class="verify-email">
  <div class="verify-email__card bos-card">
    <span class="verify-email__icon" aria-hidden="true">✉️</span>
    <h1 class="verify-email__title">Verify your email</h1>
    <p class="verify-email__text">
      We sent a verification link to your email address. Email verification will be enabled when the backend API is available.
    </p>
    <a [routerLink]="routes.auth.login">
      <app-button label="Back to Sign In" [variant]="ButtonVariant.Outline" />
    </a>
  </div>
</section>
