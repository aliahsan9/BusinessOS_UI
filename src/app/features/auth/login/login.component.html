<div class="auth-form">
  <div class="auth-form__header">
    <h2 class="auth-form__title">Welcome back</h2>
    <p class="auth-form__subtitle">Sign in to your BusinessOS account</p>
  </div>

  @if (errorMessage()) {
    <app-alert [message]="errorMessage()!" variant="danger" [dismissible]="true" (dismissed)="errorMessage.set(null)" />
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <app-input
      label="Email"
      type="email"
      formControlName="email"
      placeholder="you@company.com"
      autocomplete="email"
      [required]="true"
      [error]="getFieldError(form.controls.email, 'Email') ?? undefined"
    />

    <app-input
      label="Password"
      type="password"
      formControlName="password"
      placeholder="Enter your password"
      autocomplete="current-password"
      [required]="true"
      [error]="getFieldError(form.controls.password, 'Password') ?? undefined"
    />

    <div class="auth-form__options">
      <label class="auth-form__checkbox">
        <input type="checkbox" formControlName="rememberMe" />
        Remember me
      </label>
      <a routerLink="/auth/forgot-password" class="auth-form__link">Forgot password?</a>
    </div>

    <app-button
      label="Sign in"
      type="submit"
      [loading]="loading()"
      [fullWidth]="true"
    />

    <p class="auth-form__footer">
      Don't have an account?
      <a routerLink="/auth/register" class="auth-form__link">Create account</a>
    </p>
  </form>

  @if (devCredentials) {
    <p class="auth-form__dev-hint">
      Dev account: {{ devCredentials.email }} / {{ devCredentials.password }}
    </p>
  }
</div>
