<div class="auth-form">
  <div class="auth-form__header">
    <h2 class="auth-form__title">Reset password</h2>
    <p class="auth-form__subtitle">Enter your new password below</p>
  </div>

  @if (submitted()) {
    <app-alert title="Password updated" message="Your password has been reset. You can now sign in with your new credentials." variant="success" />
    <p class="auth-form__footer">
      <a routerLink="/auth/login" class="auth-form__link">Go to sign in →</a>
    </p>
  } @else {
    @if (errorMessage()) {
      <app-alert [message]="errorMessage()!" variant="danger" />
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <app-input label="Email" type="email" formControlName="email" [required]="true" [error]="getFieldError(form.controls.email, 'Email') ?? undefined" />
      <app-input label="New password" type="password" formControlName="newPassword" autocomplete="new-password" [required]="true" [error]="getFieldError(form.controls.newPassword, 'Password') ?? undefined" />
      <app-input label="Confirm password" type="password" formControlName="confirmPassword" autocomplete="new-password" [required]="true" [error]="getFieldError(form.controls.confirmPassword, 'Confirm password') ?? undefined" />
      <app-button label="Reset password" type="submit" [loading]="loading()" [fullWidth]="true" />
    </form>

    <p class="auth-form__footer">
      <a routerLink="/auth/login" class="auth-form__link">← Back to sign in</a>
    </p>
  }
</div>
