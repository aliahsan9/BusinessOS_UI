<div class="auth-form">
  <div class="auth-form__header">
    <h2 class="auth-form__title">Forgot password?</h2>
    <p class="auth-form__subtitle">Enter your email and we'll send reset instructions</p>
  </div>

  @if (submitted()) {
    <app-alert title="Check your email" message="If an account exists for that email, you'll receive password reset instructions shortly." variant="success" />
  } @else {
    @if (errorMessage()) {
      <app-alert [message]="errorMessage()!" variant="warning" />
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <app-input
        label="Email"
        type="email"
        formControlName="email"
        autocomplete="email"
        [required]="true"
        [error]="getFieldError(form.controls.email, 'Email') ?? undefined"
      />
      <app-button label="Send reset link" type="submit" [loading]="loading()" [fullWidth]="true" />
    </form>
  }

  <p class="auth-form__footer">
    <a routerLink="/auth/login" class="auth-form__link">← Back to sign in</a>
  </p>
</div>
