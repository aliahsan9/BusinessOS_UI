<div class="onboarding-wizard">
  <header class="onboarding-wizard__header">
    <div class="onboarding-wizard__brand">
      <span class="onboarding-wizard__logo">BusinessOS</span>
    </div>
    <div class="onboarding-wizard__progress">
      <div class="progress-bar" role="progressbar" [attr.aria-valuenow]="progressPercent()" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" [style.width.%]="progressPercent()"></div>
      </div>
      <span class="progress-label">{{ stepLabels[currentStep() - 1] }} · {{ progressPercent() }}%</span>
    </div>
    <nav class="onboarding-wizard__steps" aria-label="Onboarding steps">
      @for (label of stepLabels; track label; let i = $index) {
        <button
          type="button"
          class="step-dot"
          [class.step-dot--active]="currentStep() === i + 1"
          [class.step-dot--done]="currentStep() > i + 1"
          [attr.aria-current]="currentStep() === i + 1 ? 'step' : null"
          [attr.aria-label]="label"
          (click)="goToStep(i + 1)"
        ></button>
      }
    </nav>
  </header>

  <main class="onboarding-wizard__body">
    @switch (currentStep()) {
      @case (1) {
        <app-welcome-step
          (next)="goToStep(2)"
          (skip)="skipOnboarding()"
          (resumeLater)="resumeLater()"
        />
      }
      @case (2) {
        <app-business-setup-step
          (next)="goToStep(3)"
          (back)="goToStep(1)"
          (skipStep)="skipCurrentStep()"
        />
      }
      @case (3) {
        <app-customer-step
          (next)="goToStep(4)"
          (back)="goToStep(2)"
          (skipStep)="skipCurrentStep()"
        />
      }
      @case (4) {
        <app-project-step
          (next)="goToStep(5)"
          (back)="goToStep(3)"
          (skipStep)="skipCurrentStep()"
        />
      }
      @case (5) {
        <app-task-step
          (next)="goToStep(6)"
          (back)="goToStep(4)"
          (skipStep)="skipCurrentStep()"
        />
      }
      @case (6) {
        <app-invoice-step
          (next)="goToStep(7)"
          (back)="goToStep(5)"
          (skipStep)="skipCurrentStep()"
        />
      }
      @case (7) {
        <app-analytics-intro-step
          (next)="goToStep(8)"
          (back)="goToStep(6)"
          (skipStep)="skipCurrentStep()"
        />
      }
      @case (8) {
        <app-completion-step (finish)="completeOnboarding()" />
      }
    }
  </main>
</div>
