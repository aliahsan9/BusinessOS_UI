<div class="onboarding-step onboarding-step--welcome">
  <div class="onboarding-step__hero">
    <span class="onboarding-step__badge">Step 1 of 8</span>
    <h1>Welcome to BusinessOS</h1>
    <p class="onboarding-step__lead">
      Your all-in-one platform to manage customers, projects, tasks, invoices, expenses, and business insights.
    </p>
  </div>

  <div class="onboarding-step__grid">
    @for (feature of features; track feature.title) {
      <article class="feature-card">
        <span class="feature-card__icon" aria-hidden="true">{{ feature.icon }}</span>
        <h3>{{ feature.title }}</h3>
        <p>{{ feature.description }}</p>
      </article>
    }
  </div>

  <div class="onboarding-step__actions">
    <app-button label="Get Started" (clicked)="next.emit()" />
    <app-button label="Skip Onboarding" [variant]="ButtonVariant.Outline" (clicked)="skip.emit()" />
    <button type="button" class="link-btn" (click)="resumeLater.emit()">Resume later</button>
  </div>
</div>
