<div class="onboarding-step onboarding-step--complete">
  <div class="completion-hero">
    <span class="completion-hero__emoji">🎉</span>
    <h1>Congratulations!</h1>
    <h2>BusinessOS Setup Complete</h2>
    <p>You're ready to manage your business efficiently. Here are some quick actions to get started.</p>
  </div>

  <div class="quick-actions">
    @for (action of quickActions; track action.label) {
      <a [routerLink]="action.route" class="quick-action-card" (click)="finish.emit()">
        <span class="quick-action-card__icon">{{ action.icon }}</span>
        <span>{{ action.label }}</span>
      </a>
    }
  </div>

  <div class="onboarding-step__actions">
    <app-button label="Go to Dashboard" (clicked)="finish.emit()" />
  </div>
</div>
