<div class="onboarding-step">
  <span class="onboarding-step__badge">Step 2 of 8</span>
  <h2>Business Profile Setup</h2>
  <p class="onboarding-step__lead">Tell us about your business. We'll pre-fill this if you've already configured settings.</p>

  @if (loading()) {
    <p class="onboarding-step__loading">Loading profile…</p>
  } @else {
    <form [formGroup]="form" class="onboarding-form" (ngSubmit)="saveAndContinue()">
      <div class="form-grid">
        <app-input label="Business Name *" formControlName="name" [error]="getFieldError(form.get('name'), 'name') ?? undefined" />
        <app-input label="Logo URL" formControlName="logoUrl" placeholder="https://example.com/logo.png" />
        <app-input label="Website" formControlName="website" placeholder="https://yourbusiness.com" />
        <app-input label="Industry *" formControlName="industry" placeholder="e.g. Consulting, Retail" />
        <app-input label="Currency *" formControlName="currency" />
        <app-input label="Timezone *" formControlName="timezone" placeholder="UTC, America/New_York" />
        <div class="form-field form-field--full">
          <label for="description">Business Description</label>
          <textarea id="description" formControlName="description" class="form-control" rows="3" placeholder="Brief description of your business"></textarea>
        </div>
      </div>

      <div class="onboarding-step__actions">
        <app-button label="Back" [variant]="ButtonVariant.Outline" type="button" (clicked)="back.emit()" />
        <app-button label="Skip Step" [variant]="ButtonVariant.Ghost" type="button" (clicked)="skipStep.emit()" />
        <app-button label="Save & Continue" type="submit" [loading]="saving()" />
      </div>
    </form>
  }
</div>
