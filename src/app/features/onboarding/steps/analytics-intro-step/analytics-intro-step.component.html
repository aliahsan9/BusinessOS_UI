<div class="onboarding-step">
  <span class="onboarding-step__badge">Step 7 of 8</span>
  <h2>Analytics Introduction</h2>
  <p class="onboarding-step__lead">BusinessOS gives you powerful insights to make data-driven decisions.</p>

  <div class="analytics-grid">
    @for (item of insights; track item.title) {
      <article class="analytics-card">
        <span class="analytics-card__icon">{{ item.icon }}</span>
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
      </article>
    }
  </div>

  <div class="onboarding-step__actions">
    <app-button label="Back" [variant]="ButtonVariant.Outline" type="button" (clicked)="back.emit()" />
    <app-button label="Skip Step" [variant]="ButtonVariant.Ghost" type="button" (clicked)="skipStep.emit()" />
    <app-button label="Continue" (clicked)="next.emit()" />
  </div>
</div>
