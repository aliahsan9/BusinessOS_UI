<app-breadcrumb [items]="[{ label: 'Expenses', route: routes.expenses.list }, { label: isEdit() ? 'Edit' : 'Create' }]" />

<app-page-header [title]="isEdit() ? 'Edit Expense' : 'Create Expense'" subtitle="Record a business expense." />

@if (loading()) {
  <app-skeleton variant="rect" height="400px" />
} @else {
  <app-card>
    <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
      <app-input label="Title" formControlName="title" [error]="fieldError('title') ?? undefined" />
      <app-input label="Amount" type="number" formControlName="amount" [error]="fieldError('amount') ?? undefined" />
      <app-input label="Expense Date" type="date" formControlName="expenseDate" [error]="fieldError('expenseDate') ?? undefined" />
      <div class="form-field">
        <label class="form-label">Category</label>
        <select class="form-select" formControlName="expenseCategoryId">
          <option value="">Select category</option>
          @for (cat of categories(); track cat.id) { <option [value]="cat.id">{{ cat.name }}</option> }
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">Payment Method</label>
        <select class="form-select" formControlName="paymentMethod">
          @for (method of [PaymentMethod.Cash, PaymentMethod.BankTransfer, PaymentMethod.CreditCard, PaymentMethod.DebitCard, PaymentMethod.Cheque, PaymentMethod.OnlinePayment]; track method) {
            <option [value]="method">{{ method }}</option>
          }
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">Status</label>
        <select class="form-select" formControlName="status">
          @for (s of [ExpenseStatus.Pending, ExpenseStatus.Approved, ExpenseStatus.Rejected, ExpenseStatus.Paid]; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </div>
      <app-input label="Vendor" formControlName="vendor" />
      <app-input label="Reference Number" formControlName="referenceNumber" />
      <app-input label="Receipt URL" formControlName="receiptUrl" />
      <app-input label="Description" formControlName="description" />
      <div class="form-field">
        <label class="form-check"><input type="checkbox" class="form-check-input" formControlName="isRecurring" /> Recurring expense</label>
      </div>
      @if (form.controls.isRecurring.value) {
        <app-input label="Recurrence Pattern" formControlName="recurrencePattern" />
      }
      <div class="form-actions">
        <app-button type="submit" [label]="isEdit() ? 'Save Changes' : 'Create Expense'" [loading]="saving()" />
        <a [routerLink]="isEdit() ? [routes.expenses.base, expenseId()] : [routes.expenses.list]" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </app-card>
}
