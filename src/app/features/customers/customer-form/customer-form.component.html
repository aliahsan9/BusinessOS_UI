<app-breadcrumb
  [items]="[
    { label: 'Customers', route: routes.customers.list },
    { label: isEdit() ? 'Edit Customer' : 'Create Customer' },
  ]"
/>

<app-page-header
  [title]="isEdit() ? 'Edit Customer' : 'Create Customer'"
  subtitle="Maintain customer contact and address details."
/>

@if (loading()) {
  <app-skeleton height="20rem" variant="rect" />
} @else {
  <form [formGroup]="form" (ngSubmit)="submit()" class="entity-form">
    <app-card title="Customer Information">
      <div class="form-grid">
        <app-input label="First Name *" formControlName="firstName" [error]="fieldError('firstName') ?? undefined" />
        <app-input label="Last Name *" formControlName="lastName" [error]="fieldError('lastName') ?? undefined" />
        <app-input label="Email *" type="email" formControlName="email" [error]="fieldError('email') ?? undefined" />
        <app-input label="Phone *" formControlName="phoneNumber" [error]="fieldError('phoneNumber') ?? undefined" />
        <app-input label="City *" formControlName="city" [error]="fieldError('city') ?? undefined" />
        <app-input label="Country *" formControlName="country" [error]="fieldError('country') ?? undefined" />
        <app-input label="Postal Code *" formControlName="postalCode" [error]="fieldError('postalCode') ?? undefined" />
        <div class="form-field form-field--full">
          <label for="address">Address *</label>
          <textarea id="address" formControlName="address" class="form-control" rows="2"></textarea>
          @if (fieldError('address'); as err) {
            <span class="field-error">{{ err }}</span>
          }
        </div>
        @if (isEdit()) {
          <div class="form-field">
            <label class="checkbox-label">
              <input type="checkbox" formControlName="isActive" />
              Active customer
            </label>
          </div>
        }
      </div>
    </app-card>

    <div class="entity-form__actions">
      <a [routerLink]="routes.customers.list"><app-button label="Cancel" [variant]="ButtonVariant.Outline" type="button" /></a>
      <app-button [label]="isEdit() ? 'Save Changes' : 'Create Customer'" type="submit" [loading]="saving()" />
    </div>
  </form>
}
