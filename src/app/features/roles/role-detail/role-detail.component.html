@if (loading()) {
  <app-skeleton height="24rem" variant="rect" />
} @else if (role()) {
  @let r = role()!;
  <app-breadcrumb [items]="[{ label: 'Roles', route: routes.roles.list }, { label: r.name }]" />

  <app-page-header [title]="r.name" [subtitle]="r.description || 'Role permissions'" [actions]="headerActions()" />

  <app-card title="Role Information">
    <dl class="detail-list">
      <div><dt>Status</dt><dd><app-badge [label]="r.isActive ? 'Active' : 'Inactive'" [variant]="r.isActive ? 'success' : 'neutral'" /></dd></div>
      <div><dt>Created</dt><dd>{{ r.createdAt | date: 'medium' }}</dd></div>
      <div><dt>Assigned Permissions</dt><dd>{{ r.permissions.length }}</dd></div>
    </dl>
  </app-card>

  <app-card title="Permission Matrix" subtitle="Toggle permissions grouped by category">
    @for (group of groupedPermissions(); track group[0]) {
      <div class="permission-group">
        <h4 class="permission-group__title">{{ group[0] }}</h4>
        <div class="permission-grid">
          @for (permission of group[1]; track permission.id) {
            <label class="permission-item" [class.permission-item--readonly]="!canUpdate">
              <input
                type="checkbox"
                [checked]="hasPermission(permission.code)"
                [disabled]="!canUpdate || saving()"
                (change)="togglePermission(permission)"
              />
              <span>
                <strong>{{ permission.name }}</strong>
                <small>{{ permission.code }}</small>
                @if (permission.description) {
                  <small class="permission-desc">{{ permission.description }}</small>
                }
              </span>
            </label>
          }
        </div>
      </div>
    }
  </app-card>
}
